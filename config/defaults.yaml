model: MiniMax-M2.7
api_base: https://api.minimaxi.com/anthropic
max_retries: 3
critique:
  # v0.3.3: defaults loosened to match what real LLM output actually looks
  # like (see critique.py docstring). Pass explicit kwargs to recover strict
  # v0.1.0–v0.3.2 behavior (±20%, pov >3, hook ≥2).
  length_tolerance: 0.50
  hook_window_chars: 200
  ending_window_chars: 500
  max_pov_switches: 8
  # v0.2.0 additions:
  llm_enabled: true
  llm_max_tokens: 2000
  llm_temperature: 0.3
  llm_max_calls_per_story: 3
body:
  default_temperature: 0.7
  default_max_tokens: 20000
outline:
  default_temperature: 0.6
  default_max_tokens: 2000
title:
  candidate_count: 5
synopsis:
  target_length_chars: 120
cover:
  default_backend: auto
  image_size: [600, 800]
# Mapping from fanqie-topic-scorer's fine-grained sub-genre labels (the
# charts in fanqie-topic-scorer/config/defaults.yaml) to fanqie-short-story's
# 5 umbrella genres. Keep in sync with that file: any new chart added there
# must appear here or `daily run-once` will fail with `Unknown genre`.
# Translation rationale per pair is in commit history.
genre_mapping:
  # 男频 xuanhuan branch → 传奇 (Epic / Mythic)
  xuanhuan-xiuzhen: chuanqi     # 东方仙侠
  xuanhuan-chuantong: chuanqi   # 传统玄幻
  # 男频 dushi branch → 现言 (Modern Romance) or 甜宠 (Sweet Pet)
  dushi-richang: xianyan        # 都市日常
  dushi-zhongtian: tianchong    # 都市种田
  # 女频 yanqing branch
  yanqing-gufeng: chuanqi       # 古风世情 (period drama → epic)
  yanqing-xuanhuan: xianyan     # 玄幻言情
  yanqing-haomen: xianyan       # 豪门总裁
  yanqing-tianchong: tianchong  # 青春甜宠
  # 特殊
  kehuan-moshi: naodong         # 科幻末世
  xuanyi-naodong: xuanyi        # 悬疑脑洞

# v0.3.0 additions:
daily:
  enabled: true                  # master kill switch for daily automation
  top_n: 5                       # stories per day
  max_substitute_depth: 7        # pool depth beyond top_n for fallback
  schedule_time: "06:00"         # local time, launchd StartCalendarInterval
  notify: true                   # osascript popup on completion
  scorer_root: null              # null = default ~/CascadeProjects/projects/fanqie-topic-scorer
  output_root: "output/daily"
  log_dir: "logs/daily"
