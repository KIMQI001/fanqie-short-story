model: MiniMax-M2.7
api_base: https://api.minimaxi.com/anthropic
max_retries: 3
critique:
  length_tolerance: 0.20
  hook_window_chars: 200
  ending_window_chars: 500
  max_pov_switches: 3
  # v0.2.0 additions:
  llm_enabled: true
  llm_max_tokens: 2000
  llm_temperature: 0.3
  llm_max_calls_per_story: 3
body:
  default_temperature: 0.7
  default_max_tokens: 20000
outline:
  default_temperature: 0.6
  default_max_tokens: 2000
title:
  candidate_count: 5
synopsis:
  target_length_chars: 120
cover:
  default_backend: auto
  image_size: [600, 800]
genre_mapping:
  kehuan-moshi: naodong
  xuanhuan-xiuzhen: chuanqi
  dushi-rich: xianyan
  xianyan-rich: xianyan
  chuanyue-rich: chuanqi
  yanqing: chuanqi
